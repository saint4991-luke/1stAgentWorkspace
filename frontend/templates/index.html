<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 蝦米 Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .link-card {
            display: block;
            padding: 30px;
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        
        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .link-card.general {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .link-card.vh {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .link-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .link-card p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 蝦米 Agent</h1>
        <p class="subtitle">選擇一個模式開始對話</p>
        
        <div class="links">
            <a href="/chat" class="link-card general">
                <span class="icon">💬</span>
                <h2>一般對話</h2>
                <p>普通的 AI 對話助手，支援文件管理與多種工具</p>
            </a>
            
            <a href="/vh/chat" class="link-card vh">
                <span class="icon">🎭</span>
                <h2>虛擬人對話</h2>
                <p>與優必醬或護士姐姐進行角色扮演對話</p>
            </a>
        </div>
        
        <div class="footer">
            Agent Shrimp v4.1.0
        </div>
    </div>
</body>
</html>
