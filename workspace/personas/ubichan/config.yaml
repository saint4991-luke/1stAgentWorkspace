# ===========================================
# 優必醬 (Ubi-chan) 角色配置文件 v2.0
# ===========================================
# 說明：此配置文件定義優必醬的角色設定與行為規則
# 維護者：蝦米 Agent 團隊
# 最後更新：2026-04-16
# 規格：specs/prompt-generation-spec.md v2.1
# ===========================================

# -------------------------------------------
# 基本設定
# -------------------------------------------
persona_id: ubichan
display_name: 優必醬

# -------------------------------------------
# 風格定義
# -------------------------------------------
# file: 風格文件路徑（相對於 personas/{persona_id}/）
style:
  file: style.md

# -------------------------------------------
# 輸出格式
# -------------------------------------------
# virtual_human: 情緒標籤 + 語言標籤 + 斷句符號
# chat: 一般文字回應，無特殊格式
output_format: virtual_human

# -------------------------------------------
# 知識庫設定
# -------------------------------------------
# enabled: 是否啟用知識庫
# folders: 有權限讀取的知識庫資料夾（相對於 /knowledge/）
knowledge:
  enabled: true
  folders:
    - ubitus/

# -------------------------------------------
# 工具設定（保留擴充）
# -------------------------------------------
# enabled: 是否啟用工具
# available: 可用的工具列表
tools:
  enabled: false
  available: []

# -------------------------------------------
# Metadata（元數據）
# -------------------------------------------
# version: 配置文件版本
# persona_type: 角色類型
# company: 所屬公司
# target_audience: 目標受眾
# tone: 語氣風格
metadata:
  version: "2.0"
  persona_type: virtual_idol
  company: 優必達
  target_audience: general
  tone: cheerful friendly
