# ===========================================
# {角色名稱} 角色配置文件 v2.0
# ===========================================
# 說明：此為角色配置文件範本
# 維護者：{維護者名稱}
# 最後更新：{日期}
# 規格：specs/prompt-generation-spec.md v2.1
# ===========================================

# -------------------------------------------
# 基本設定
# -------------------------------------------
# persona_id: 角色唯一識別（小寫英文，用於 Session ID 前綴）
# display_name: 顯示名稱（人類可讀）
persona_id: {角色 ID}
display_name: {角色顯示名稱}

# -------------------------------------------
# 風格定義
# -------------------------------------------
# file: 風格文件路徑（相對於 personas/{persona_id}/）
# 風格文件應包含：
#   - 角色設定（身份背景、性格特徵、說話風格）
#   - 回覆規則（必須遵守的原則、禁止事項）
#   - 範例對話
style:
  file: style.md

# -------------------------------------------
# 輸出格式
# -------------------------------------------
# virtual_human: 情緒標籤 + 語言標籤 + 斷句符號（用於前端表演）
# chat: 一般文字回應，無特殊格式（用於純文字對話）
output_format: virtual_human

# -------------------------------------------
# 知識庫設定
# -------------------------------------------
# enabled: 是否啟用知識庫（true | false）
# folders: 有權限讀取的知識庫資料夾（相對於 /knowledge/）
# 知識庫用於 RAG（檢索增強生成），LLM1 讀取 Meta，LLM2 讀取完整內容
knowledge:
  enabled: true
  folders:
    - "{知識庫資料夾 1}/"
    - "{知識庫資料夾 2}/"

# -------------------------------------------
# 工具設定（保留擴充）
# -------------------------------------------
# enabled: 是否啟用工具（true | false）
# available: 可用的工具列表
# 未來可擴充：web_search, calculator, calendar 等
tools:
  enabled: false
  available: []

# -------------------------------------------
# Metadata（元數據）
# -------------------------------------------
# version: 配置文件版本（建議使用語義版本）
# persona_type: 角色類型（virtual_idol | health_professional | assistant | ...）
# company: 所屬公司或組織
# target_audience: 目標受眾
# tone: 語氣風格（cheerful, professional, gentle, ...）
metadata:
  version: "2.0"
  persona_type: "{角色類型}"
  company: "{公司名稱}"
  target_audience: "{目標受眾}"
  tone: "{語氣風格}"

# ===========================================
# 使用說明
# ===========================================
# 1. 複製此範本到新的角色目錄
# 2. 替換所有 {大括號} 內容為實際值
# 3. 創建 style.md 風格文件
# 4. 準備知識庫資料夾（如啟用）
# 5. 測試驗證配置文件
#
# 參考文件：
#   - specs/prompt-generation-spec.md v2.1
#   - specs/virtual-human-output-spec.md
#   - docs/02_specs/05_KNOWLEDGE_SPEC.md
# ===========================================
